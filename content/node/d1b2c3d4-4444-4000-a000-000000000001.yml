  schema_text:
    -
      value: '<p>Meridian Partners is an independent consulting firm serving small businesses and their owners across the region. We provide strategy, operations, and growth advisory services with the personal attention that growing companies deserve.</p><p>We believe good advice starts with listening. Every engagement begins with understanding how your business actually works — not with a template. Our consultants stay with you from diagnosis through execution, and we measure our success by the results you keep after we leave.</p><p>Today our team serves hundreds of clients across dozens of industries, from family-run shops to fast-growing professional firms. What has not changed is the way we work: senior people, plain language, and recommendations we would stake our own money on.</p>'
      format: content_format
