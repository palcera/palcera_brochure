seckit_xss:
  csp:
    checkbox: true
    vendor-prefix:
      x: false
      webkit: false
    report-only: true
    default-src: "'self'"
    script-src: "'self'"
    object-src: ''
    style-src: "'self' 'unsafe-inline'"
    img-src: "'self' data:"
    media-src: ''
    frame-src: ''
    frame-ancestors: ''
    child-src: ''
    font-src: "'self' data:"
    connect-src: "'self'"
    report-uri: /report-csp-violation
    upgrade-req: false
    policy-uri: ''
  x_xss:
    select: 0
seckit_csrf:
  origin: false
  origin_whitelist: ''
seckit_clickjacking:
  js_css_noscript: false
  noscript_message: 'Sorry, you need to enable JavaScript to visit this website.'
  x_frame: '1'
  x_frame_allow_from: ''
seckit_ssl:
  hsts: false
  hsts_subdomains: false
  hsts_max_age: 1000
  hsts_preload: false
seckit_ct:
  expect_ct: false
  max_age: 86400
  report_uri: ''
  enforce: false
seckit_fp:
  feature_policy: false
  feature_policy_policy: ''
seckit_various:
  from_origin: false
  from_origin_destination: same
  referrer_policy: true
  referrer_policy_policy: strict-origin-when-cross-origin
  disable_autocomplete: false
